const headers = ["Feature", "#", "Total", "INVEST", "BID", "ACQ", "CLOSE", "DIV", "ISSUE", "IPO", "PAR"];

function buildTable(tblId, rows) {
  let maxVal = 0;
  for (const r of rows)
    for (let i = 2; i < r.length; i++)
      if (r[i] > maxVal) maxVal = r[i];

  function heatColor(v) {
    if (v === 0) return "rgba(0,0,0,0)";
    const t = v / maxVal;
    const h = t * 120;
    const s = 70 + t * -5;
    const l = 18 + t * 22;
    return "hsl(" + h + "," + s + "%," + l + "%)";
  }

  function fmtVal(v) {
    if (v === 0) return "0";
    if (v < 0.0005) return v.toExponential(0);
    return v.toFixed(4);
  }

  const tbl = document.getElementById(tblId);
  const thead = tbl.createTHead().insertRow();
  for (const h of headers) {
    const th = document.createElement("th");
    th.textContent = h;
    thead.appendChild(th);
  }
  const tbody = tbl.createTBody();
  for (const r of rows) {
    const tr = tbody.insertRow();
    for (let i = 0; i < r.length; i++) {
      const td = tr.insertCell();
      if (i <= 1) {
        td.textContent = r[i];
      } else {
        td.textContent = fmtVal(r[i]);
        td.style.backgroundColor = heatColor(r[i]);
        if (r[i] / maxVal > 0.45) td.style.color = "#fff";
      }
    }
  }
}
